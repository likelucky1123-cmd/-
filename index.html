                      {unreadCount > 0 && <div className="bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full mr-2">{unreadCount}</div>}
                      <ChevronRight className="text-gray-300" size={20} />
                    </div>
                  );
                })
              )}
            </div>
          </div>
        );
      }

      const activeUserData = usersMap[activeChatUser] || { id: activeChatUser, displayName: activeChatUser };
      const isBlockedByThem = activeUserData.blockedUsers?.includes(username);

      return (
        <div className="flex flex-col h-full bg-slate-50 relative overflow-x-hidden">
          <div className="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
            <div className="flex items-center min-w-0 pr-4">
              <button onClick={() => setActiveChatUser(null)} className="mr-3 p-1.5 bg-gray-100 hover:bg-green-100 rounded-full flex-shrink-0"><ChevronLeft size={20} /></button>
              <div className="flex items-center space-x-2 cursor-pointer min-w-0" onClick={() => onUserClick(activeChatUser)}>
                <UserAvatar user={activeUserData} size="w-8 h-8" />
                <h3 className="font-bold text-gray-800 text-lg hover:underline truncate flex items-center">
                  {activeUserData.displayName}
                  {isAdminUser(activeChatUser) && <ShieldCheck size={14} className="ml-1 text-blue-500 flex-shrink-0" title="管理員" />}
                  {isBlockedByThem && <AlertCircle size={16} className="ml-1.5 text-red-500 flex-shrink-0" title="被拉黑" />}
                </h3>
              </div>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto p-4 space-y-1 pb-32 relative z-30">
            {messages.map(msg => (
              <ChatMessageBubble key={msg.id} msg={msg} username={username} formatTime={formatTime} onEdit={onSwipeEdit} onDelete={onSwipeDelete} />
            ))}
            <div ref={msgEndRef} />
          </div>
          
          <div className="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-3 pb-8 sm:p-4 sm:pb-6 z-40 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            <form onSubmit={handleSend} className="flex space-x-2">
              <input type="text" value={newMsg} onChange={e => setNewMsg(e.target.value)} placeholder="輸入訊息..." disabled={isSending} className="flex-1 bg-gray-100 px-5 py-2.5 focus:bg-white focus:border-green-400 focus:ring-2 outline-none rounded-full"/>
              <button type="submit" disabled={!newMsg.trim() || isSending} className="bg-green-500 text-white w-11 h-11 rounded-full flex items-center justify-center disabled:opacity-50"><Send size={18} className="ml-1" /></button>
            </form>
          </div>
        </div>
      );
    }

    function ChatMessageBubble({ msg, username, formatTime, onEdit, onDelete }) {
      const isMe = msg.sender === username;
      const isDeleted = msg.isDeleted;
      const pressTimer = useRef(null);
      const [showMenu, setShowMenu] = useState(false);

      const startPress = () => {
        if (!isMe || isDeleted) return;
        pressTimer.current = setTimeout(() => setShowMenu(true), 500);
      };
      const clearPress = () => { if (pressTimer.current) clearTimeout(pressTimer.current); };

      return (
        <div className={`flex w-full ${isMe ? 'justify-end' : 'justify-start'} relative mb-2`}>
          <div
            className="max-w-[85%] sm:max-w-[75%] inline-block relative"
            onTouchStart={startPress} onTouchEnd={clearPress} onTouchMove={clearPress}
            onMouseDown={startPress} onMouseUp={clearPress} onMouseLeave={clearPress}
            onContextMenu={e => { if (isMe && !isDeleted) e.preventDefault(); }} 
          >
            {showMenu && (
              <div className={`absolute bottom-full mb-2 ${isMe ? 'right-0' : 'left-0'} flex bg-gray-800 text-white rounded-2xl shadow-lg z-50 overflow-hidden animate-in fade-in zoom-in-95`}>
                <button onClick={(e) => { e.stopPropagation(); onEdit(msg.id, msg.text, msg.sender); setShowMenu(false); }} className="px-4 py-2.5 hover:bg-gray-700 text-sm font-bold flex items-center"><Edit3 size={14} className="mr-1.5"/> 編輯</button>
                <div className="w-px bg-gray-600 my-1"></div>
                <button onClick={(e) => { e.stopPropagation(); onDelete(msg.id); setShowMenu(false); }} className="px-4 py-2.5 hover:bg-gray-700 text-red-400 text-sm font-bold flex items-center"><Trash2 size={14} className="mr-1.5"/> 刪除</button>
              </div>
            )}
            <div className={`px-4 py-2.5 shadow-sm ${isMe ? (isDeleted ? 'bg-gray-300 text-gray-600' : 'bg-green-500 text-white') : (isDeleted ? 'bg-gray-200 text-gray-500 border border-gray-300' : 'bg-white border border-gray-200 text-gray-800')} ${isMe ? 'rounded-2xl rounded-br-sm' : 'rounded-2xl rounded-bl-sm'}`}>

    function UserInfoModal({ targetUsername, username, usersMap, friendships, onClose, onGoChat, pinnedUsers, blockedUsers, onTogglePin, onToggleBlock }) {
      const [isProcessing, setIsProcessing] = useState(false);
      const targetUser = usersMap[targetUsername] || { id: targetUsername, displayName: targetUsername };
      
      const [isFriend, setIsFriend] = useState(false);
      useEffect(() => {
        const chatId = [username, targetUsername].sort().join('_');
        getDoc(doc(db, 'friendships', chatId)).then(snap => setIsFriend(snap.exists()));
      }, [username, targetUsername]);

      const handleAddFriend = async () => {
        setIsProcessing(true);
        const chatId = [username, targetUsername].sort().join('_');
        await setDoc(doc(db, 'friendships', chatId), { users: [username, targetUsername], timestamp: Date.now() });
        setIsFriend(true);
        setIsProcessing(false);
      };

      const isBlocked = blockedUsers.includes(targetUsername);
      const isPinned = pinnedUsers.includes(targetUsername);

      return (
        <div className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-white rounded-3xl max-w-sm w-full p-6 relative shadow-2xl animate-in zoom-in-95" onClick={e => e.stopPropagation()}>
            <button onClick={onClose} className="absolute top-4 right-4 bg-gray-100 p-2 rounded-full text-gray-500 hover:bg-gray-200 transition-colors"><X size={20} /></button>
            
            <div className="flex flex-col items-center mt-4">
              <div className="w-24 h-24 mb-4"><UserAvatar user={targetUser} size="w-full h-full" textClass="text-3xl" /></div>
              <h2 className="text-2xl font-bold text-gray-900 flex items-center">
                {targetUser.displayName}
                {isAdminUser(targetUsername) && <ShieldCheck size={20} className="ml-1 text-blue-500 flex-shrink-0" title="管理員" />}
              </h2>
              <p className="text-sm text-gray-400 mt-1">@{targetUser.id}</p>
              {targetUser.signature && <div className="bg-gray-50 px-4 py-3 rounded-2xl mt-4 text-gray-600 text-sm italic border border-gray-100 w-full text-center">"{targetUser.signature}"</div>}
              
              {username !== targetUsername && (
                <div className="w-full mt-6 space-y-3">
                  {isBlocked ? (
                    <button onClick={() => onToggleBlock(targetUsername)} className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3.5 rounded-2xl shadow-sm transition-colors flex items-center justify-center">
                      <UserPlus size={18} className="mr-2" /> 解除拉黑
                    </button>
                  ) : (
                    <>
                      {isFriend ? (
                        <button onClick={() => onGoChat(targetUsername)} className="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3.5 rounded-2xl shadow-md transition-colors flex items-center justify-center">
                          <MessageSquareText size={18} className="mr-2" /> 發送訊息
                        </button>
                      ) : (
                        <button onClick={handleAddFriend} disabled={isProcessing} className="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3.5 rounded-2xl shadow-md transition-colors disabled:opacity-50 flex items-center justify-center">
                          <UserPlus size={18} className="mr-2" /> {isProcessing ? '加入中...' : '加為好友'}
                        </button>
                      )}
                      <div className="flex space-x-3">
                        <button onClick={() => onTogglePin(targetUsername)} className={`flex-1 font-bold py-3 rounded-2xl shadow-sm transition-colors flex items-center justify-center ${isPinned ? 'bg-blue-100 text-blue-700 hover:bg-blue-200' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                          <Pin size={16} className="mr-1.5" /> {isPinned ? '取消釘選' : '釘選聊天'}
                        </button>
                        <button onClick={() => onToggleBlock(targetUsername)} className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 font-bold py-3 rounded-2xl shadow-sm transition-colors flex items-center justify-center">
                          <Ban size={16} className="mr-1.5" /> 拉黑封鎖
                        </button>
                      </div>
                    </>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function ProfileView({ username, userData, usersMap, onLogout, onClose }) {
      const [displayName, setDisplayName] = useState(userData.displayName || username);
      const [signature, setSignature] = useState(userData.signature || '');
      const [avatarImage, setAvatarImage] = useState(userData.avatarImage || null);
      const [isSaving, setIsSaving] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const avatarInputRef = useRef(null);

      const blockedUsers = userData.blockedUsers || [];

      const handleSave = async (e) => {
        e.preventDefault();
        setErrorMsg('');
        const newName = displayName.trim();
        if (!newName) return;
        setIsSaving(true);
        const isDuplicate = Object.values(usersMap).some(u => u.displayName === newName && u.id !== username);
        if (isDuplicate) { setErrorMsg('此用戶名已被使用，請更改用戶名。'); setIsSaving(false); return; }
        try {
          await updateDoc(doc(db, 'appUsers', username), { displayName: newName, signature: signature.trim(), avatarImage });
          onClose(); 
        } catch (err) { setErrorMsg('儲存失敗'); setIsSaving(false); } 
      };

      const handleUnblock = async (targetId) => {
        const newBlocked = blockedUsers.filter(id => id !== targetId);
        await updateDoc(doc(db, 'appUsers', username), { blockedUsers: newBlocked });
      };

      return (
        <div className="h-full bg-slate-50 overflow-y-auto p-4 sm:p-8 relative pt-16 sm:pt-20">
          <button onClick={onClose} className="absolute top-4 sm:top-8 right-4 sm:right-8 bg-white p-2 rounded-full shadow-md text-gray-500 hover:bg-gray-100"><X size={24} /></button>
          <div className="max-w-md mx-auto bg-white rounded-3xl shadow-xl border border-gray-100 p-6 sm:p-8 mt-4 mb-10">
            <div className="flex flex-col items-center mb-8 relative">
              <div className="relative group cursor-pointer" onClick={() => avatarInputRef.current?.click()}>
                <div className={`w-28 h-28 rounded-full flex items-center justify-center text-white text-3xl font-bold shadow-md border-4 border-white ${!avatarImage ? getAvatarColor(displayName) : ''} overflow-hidden bg-gray-100`}>
                  {avatarImage ? <img src={avatarImage} className="w-full h-full object-cover" /> : displayName.charAt(0).toUpperCase()}
                </div>
                <div className="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><Camera className="text-white" size={24} /></div>
              </div>
              <input type="file" accept="image/*" ref={avatarInputRef} onChange={e => {if(e.target.files[0]) compressImage(e.target.files[0]).then(res => setAvatarImage(res))}} className="hidden" />
              <h2 className="text-2xl font-bold mt-4 text-gray-800 flex items-center">
                個人資訊設定
                {isAdminUser(username) && <ShieldCheck size={24} className="ml-2 text-blue-500 flex-shrink-0" title="最高管理員" />}
              </h2>
            </div>
            
            {errorMsg && <div className="bg-red-50 text-red-600 font-bold p-3 rounded-2xl mb-4 text-center">{errorMsg}</div>}
            
            <form onSubmit={handleSave} className="space-y-5">
              <input type="text" value={displayName} onChange={e => setDisplayName(e.target.value)} className="w-full px-4 py-3 bg-gray-50 border rounded-2xl focus:ring-2 focus:ring-yellow-400 outline-none" placeholder="顯示名稱" disabled={isSaving} />
              <textarea value={signature} onChange={e => setSignature(e.target.value)} rows="2" className="w-full px-4 py-3 bg-gray-50 border rounded-2xl focus:ring-2 focus:ring-yellow-400 outline-none resize-none" placeholder="簽名..." disabled={isSaving} />
              <div className="pt-4 space-y-3">
                <button type="submit" disabled={isSaving} className="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3.5 rounded-2xl transition-colors disabled:opacity-50"><Save size={18} className="inline mr-2" /> {isSaving ? '儲存中...' : '儲存並返回'}</button>
                <button type="button" onClick={onLogout} disabled={isSaving} className="w-full bg-red-50 text-red-600 font-bold py-3.5 rounded-2xl transition-colors hover:bg-red-100 disabled:opacity-50"><LogOut size={18} className="inline mr-2" /> 登出帳號</button>
              </div>
            </form>

            {/* 黑名單管理區塊 */}
            {blockedUsers.length > 0 && (
              <div className="mt-8 pt-6 border-t border-gray-100">
                <h3 className="text-sm font-bold text-gray-500 mb-3 flex items-center"><Ban size={16} className="mr-1.5"/> 黑名單管理</h3>
                <div className="space-y-2">
                  {blockedUsers.map(bId => {
                    const bUser = usersMap[bId] || { displayName: bId };
                    return (
                      <div key={bId} className="flex items-center justify-between bg-gray-50 p-3 rounded-2xl border border-gray-100">
                        <span className="font-bold text-gray-700">{bUser.displayName}</span>
                        <button type="button" onClick={() => handleUnblock(bId)} className="text-xs font-bold text-blue-600 hover:text-white bg-blue-50 hover:bg-blue-500 px-3 py-1.5 rounded-2xl transition-colors">解除封鎖</button>
                      </div>
                    )
                  })}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
